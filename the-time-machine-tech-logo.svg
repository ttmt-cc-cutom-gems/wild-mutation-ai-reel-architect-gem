<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="glowHourglass" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0A0F14"/>
  <circle cx="100" cy="100" r="90" fill="url(#glowHourglass)"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#00FFFF" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="4 8"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#00FFFF" stroke-width="2" stroke-opacity="0.8"/>
  
  <!-- Hourglass -->
  <path d="M 80 50 L 120 50 C 120 50, 115 70, 100 100 C 85 70, 80 50, 80 50 Z" fill="none" stroke="#00FFFF" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 80 150 L 120 150 C 120 150, 115 130, 100 100 C 85 130, 80 150, 80 150 Z" fill="none" stroke="#00FFFF" stroke-width="4" stroke-linejoin="round"/>
  
  <path d="M 75 45 L 125 45" fill="none" stroke="#00FFFF" stroke-width="4" stroke-linecap="round"/>
  <path d="M 75 155 L 125 155" fill="none" stroke="#00FFFF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Sand -->
  <path d="M 85 145 C 90 125, 100 115, 100 115 C 100 115, 110 125, 115 145 Z" fill="#00FFFF" fill-opacity="0.8"/>
  <circle cx="100" cy="100" r="2" fill="#00FFFF"/>
  <circle cx="100" cy="105" r="2" fill="#00FFFF"/>
  <circle cx="100" cy="110" r="2" fill="#00FFFF"/>

  <!-- Brackets -->
  <path d="M 55 100 L 70 85 M 55 100 L 70 115" fill="none" stroke="#00FFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 145 100 L 130 85 M 145 100 L 130 115" fill="none" stroke="#00FFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
